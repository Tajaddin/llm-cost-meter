# Spin up a local Prometheus + Grafana that scrapes a Python process exposing
# /metrics on host port 9000.
#
# Usage:
#   1. In the project root, run a Python process that wraps an LLM client and
#      calls llm_cost_meter.start_metrics_server(9000). See README "Quickstart".
#   2. Set the Grafana admin password (required, no default):
#        export GRAFANA_ADMIN_PASSWORD=<your-strong-password>
#   3. From this directory: `docker compose up -d`
#   4. Open Grafana at http://localhost:3000 (login admin / $GRAFANA_ADMIN_PASSWORD).
#      The "LLM Cost Meter" dashboard is preloaded.

services:
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: lcm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: lcm-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # No fallback: compose up fails fast if GRAFANA_ADMIN_PASSWORD is unset,
      # which is what we want for a demo that ships a dashboard but should not
      # ship a usable admin login.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
